<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#1a56db">
  <!-- Drywall sheet - clean, no trowel -->
  <rect x="8" y="4" width="36" height="56" rx="1.5"/>
  <!-- White surface -->
  <rect x="12" y="8" width="28" height="48" rx="1" fill="#fff"/>
  <!-- Screw marks -->
  <circle cx="18" cy="16" r="2.2"/>
  <circle cx="34" cy="16" r="2.2"/>
  <circle cx="18" cy="32" r="2.2"/>
  <circle cx="34" cy="32" r="2.2"/>
  <circle cx="18" cy="48" r="2.2"/>
  <circle cx="34" cy="48" r="2.2"/>
  <!-- Second sheet behind (offset) -->
  <rect x="20" y="6" width="36" height="56" rx="1.5" fill="#1a56db" opacity="0.3"/>
</svg>
