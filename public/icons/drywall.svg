  <rect x="14" y="8" width="32" height="44" rx="1" fill="#1a56db" opacity="0.05" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- T-square / measuring tool -->
  <path d="M46 16v36" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round"/>
