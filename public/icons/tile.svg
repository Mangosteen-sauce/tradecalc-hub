<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Tile grid pattern -->
  <rect x="8" y="8" width="48" height="48" rx="2" fill="#1a56db" opacity="0.05"/>
  <!-- Row 1 -->
  <rect x="10" y="10" width="13" height="13" rx="1" fill="#1a56db" opacity="0.2" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="25.5" y="10" width="13" height="13" rx="1" fill="#1a56db" opacity="0.15" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="41" y="10" width="13" height="13" rx="1" fill="#1a56db" opacity="0.25" stroke="#1a56db" stroke-width="1.5"/>
  <!-- Row 2 -->
  <rect x="10" y="25.5" width="13" height="13" rx="1" fill="#1a56db" opacity="0.15" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="25.5" y="25.5" width="13" height="13" rx="1" fill="#1a56db" opacity="0.3" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="41" y="25.5" width="13" height="13" rx="1" fill="#1a56db" opacity="0.15" stroke="#1a56db" stroke-width="1.5"/>
  <!-- Row 3 -->
  <rect x="10" y="41" width="13" height="13" rx="1" fill="#1a56db" opacity="0.25" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="25.5" y="41" width="13" height="13" rx="1" fill="#1a56db" opacity="0.15" stroke="#1a56db" stroke-width="1.5"/>
  <rect x="41" y="41" width="13" height="13" rx="1" fill="#1a56db" opacity="0.2" stroke="#1a56db" stroke-width="1.5"/>
</svg>
