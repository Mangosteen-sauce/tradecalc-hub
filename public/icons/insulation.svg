  <!-- Right zigzag insulation -->
  <path d="M35 6l10 8-10 8 10 8-10 8 10 8-10 8 10 8" stroke="#1a56db" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
