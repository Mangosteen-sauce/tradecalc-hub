<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#1a56db">
  <!-- Paint bucket -->
  <path d="M4 22h28v32H4z"/>
  <rect x="4" y="18" width="28" height="6" rx="1"/>
  <!-- Bucket handle -->
  <path d="M10 18v-6a8 8 0 0 1 16 0v6" fill="none" stroke="#1a56db" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bucket label (white inset) -->
  <rect x="8" y="30" width="20" height="16" rx="1" fill="#fff"/>
  <!-- Paint drip on side -->
  <path d="M32 28c0 0 1 6 0 10" stroke="#1a56db" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Paint roller -->
  <rect x="42" y="10" width="14" height="22" rx="6" fill="#1a56db"/>
  <!-- Roller texture -->
  <line x1="44" y1="16" x2="54" y2="16" stroke="#fff" stroke-width="1.2"/>
  <line x1="44" y1="20" x2="54" y2="20" stroke="#fff" stroke-width="1.2"/>
  <line x1="44" y1="24" x2="54" y2="24" stroke="#fff" stroke-width="1.2"/>
  <!-- Roller handle -->
  <path d="M49 32v18" stroke="#1a56db" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M45 50h8" stroke="#1a56db" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Roller arm connecting to bucket area -->
  <path d="M42 21h-6" stroke="#1a56db" stroke-width="3" stroke-linecap="round"/>
</svg>
