<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#1a1a1a">
  <!-- Paint can - bold outline style -->
  <rect x="6" y="20" width="30" height="34" rx="2" stroke-width="4" fill="#1a1a1a"/>
  <!-- Can opening -->
  <rect x="6" y="20" width="30" height="8" rx="2" fill="#1a1a1a" stroke-width="4"/>
  <!-- Can label area -->
  <rect x="10" y="32" width="22" height="14" rx="1" fill="#fff" stroke="none"/>
  <!-- Handle -->
  <path d="M14 20v-6h14v6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Paint drips -->
  <path d="M36 28c0 4-1 8-2 10" stroke-width="3" stroke-linecap="round"/>
  <path d="M33 26c0 3-1 5-1 6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Paint roller -->
  <rect x="44" y="8" width="12" height="24" rx="5" fill="#1a1a1a" stroke-width="3"/>
  <!-- Roller handle -->
  <path d="M50 32v20" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M46 52h8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Roller arm -->
  <path d="M44 20h-4" stroke-width="3" stroke-linecap="round"/>
</svg>
