<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#1a1a1a">
  <!-- Brick wall - bold solid with white mortar lines -->
  <rect x="2" y="2" width="60" height="60" rx="2"/>
  <!-- Mortar lines (white gaps) -->
  <!-- Horizontal mortar -->
  <rect x="2" y="16" width="60" height="2.5" fill="#fff"/>
  <rect x="2" y="31" width="60" height="2.5" fill="#fff"/>
  <rect x="2" y="46" width="60" height="2.5" fill="#fff"/>
  <!-- Vertical mortar - row 1 -->
  <rect x="22" y="2" width="2.5" height="14" fill="#fff"/>
  <rect x="44" y="2" width="2.5" height="14" fill="#fff"/>
  <!-- Vertical mortar - row 2 (offset) -->
  <rect x="12" y="18.5" width="2.5" height="12.5" fill="#fff"/>
  <rect x="34" y="18.5" width="2.5" height="12.5" fill="#fff"/>
  <rect x="54" y="18.5" width="2.5" height="12.5" fill="#fff"/>
  <!-- Vertical mortar - row 3 -->
  <rect x="22" y="33.5" width="2.5" height="12.5" fill="#fff"/>
  <rect x="44" y="33.5" width="2.5" height="12.5" fill="#fff"/>
  <!-- Vertical mortar - row 4 (offset) -->
  <rect x="12" y="48.5" width="2.5" height="13.5" fill="#fff"/>
  <rect x="34" y="48.5" width="2.5" height="13.5" fill="#fff"/>
  <rect x="54" y="48.5" width="2.5" height="13.5" fill="#fff"/>
</svg>
